<!DOCTYPE html>
<html>
<head>
  <title>Teacher Submissions</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef4fb;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #004aad;
      color: white;
      padding: 20px;
    }

    .sidebar h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.28);
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    .page-card {
      background: white;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    .page-header {
      margin-bottom: 20px;
    }

    .page-header h2 {
      margin: 0;
      color: #004aad;
    }

    .page-header p {
      margin-top: 8px;
      color: #666;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .toolbar input,
    .toolbar select {
      padding: 10px;
      border: 1px solid #c8d7ea;
      border-radius: 8px;
      font-size: 14px;
    }

    .toolbar input {
      min-width: 280px;
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #dce7f5;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f2f7ff;
      color: #004aad;
    }

    .status {
      font-weight: bold;
      text-transform: capitalize;
    }

    .status.submitted {
      color: #0b8f3c;
    }

    .status.draft {
      color: #cc8400;
    }

    .status.returned {
      color: #c62828;
    }

    .status.checked {
      color: #1565c0;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h3>Dept Head Portal</h3>
    <button onclick="location.href='checker-dashboard.html'">Dashboard</button>
    <button onclick="location.href='depthead-profile.html'">My Profile</button>
    <button onclick="location.href='depthead-lesson-plan.html'">My Lesson Plan</button>
    <button onclick="location.href='teacher-submissions.html'">Teacher Submissions</button>
    <button onclick="location.href='checker-review-list.html'">Review Queue</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="page-card">

      <div class="page-header">
        <h2>Teacher Submissions</h2>
        <p>Monitor teacher lesson plan submissions assigned to your department.</p>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search teacher, subject, grade, date..." oninput="filterSubmissions()">

        <select id="statusFilter" onchange="filterSubmissions()">
          <option value="">All Status</option>
          <option value="submitted">Submitted</option>
          <option value="draft">Draft</option>
          <option value="returned">Returned</option>
          <option value="checked">Checked</option>
        </select>
      </div>

      <table>
        <thead>
          <tr>
            <th>Teacher</th>
            <th>Grade</th>
            <th>Learning Area</th>
            <th>Quarter</th>
            <th>Date Range</th>
            <th>Status</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody id="submissionTableBody">
          <tr>
            <td colspan="7" class="empty">Loading submissions...</td>
          </tr>
        </tbody>
      </table>

      <div id="message"></div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
  authDomain: "teachers-portal-98254.firebaseapp.com",
  projectId: "teachers-portal-98254",
  storageBucket: "teachers-portal-98254.firebasestorage.app",
  messagingSenderId: "479254583768",
  appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let currentProfile;
let allSubmissions = [];

function setMessage(text, color = "red"){
  const message = document.getElementById("message");
  message.style.color = color;
  message.innerText = text;
}

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  const userSnap = await getDoc(doc(db, "users", user.uid));
  if(!userSnap.exists()){
    window.location.href = "login.html";
    return;
  }

  currentProfile = userSnap.data();

  if(currentProfile.role !== "department_head" && currentProfile.role !== "super_admin"){
    alert("Access denied.");
    window.location.href = "login.html";
    return;
  }

  loadTeacherSubmissions();
});

async function loadTeacherSubmissions(){
  try{
    const snap = await getDocs(collection(db, "lessonPlans"));
    allSubmissions = [];

    snap.forEach(docSnap => {
      const data = docSnap.data();

const lessonSchoolId = (data.schoolId || "").trim();
const lessonDeptHead = (data.assignedDepartmentHead || "").trim().toLowerCase();

const currentSchoolId = (currentProfile.schoolId || "").trim();
const currentDeptHeadName = (currentProfile.name || "").trim().toLowerCase();

if(
  lessonSchoolId === currentSchoolId &&
  lessonDeptHead === currentDeptHeadName
){
  allSubmissions.push({
    id: docSnap.id,
    ...data
  });
}
    });

    // newest submissions first
    allSubmissions.sort((a, b) => {
      const aTime = a.submittedAt || "";
      const bTime = b.submittedAt || "";
      return bTime.localeCompare(aTime);
    });

    renderSubmissions(allSubmissions);

  }catch(error){
    console.error(error);
    setMessage("Failed to load teacher submissions.");
  }
}

function renderSubmissions(list){
  const tbody = document.getElementById("submissionTableBody");

  if(list.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="7" class="empty">No submissions found.</td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = "";

  list.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.teacherName || ""}</td>
      <td>${item.grade || ""}</td>
      <td>${item.learningArea || ""}</td>
      <td>${item.quarter || ""}</td>
      <td>${item.dateRange || ""}</td>
      <td><span class="status ${item.status || ""}">${item.status || ""}</span></td>
      <td>${item.submittedAt || "-"}</td>
    `;

    tbody.appendChild(tr);
  });
}

window.filterSubmissions = function(){
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const statusValue = document.getElementById("statusFilter").value.toLowerCase();

  const filtered = allSubmissions.filter(item => {
    const text = `
      ${item.teacherName || ""}
      ${item.grade || ""}
      ${item.learningArea || ""}
      ${item.quarter || ""}
      ${item.dateRange || ""}
      ${item.status || ""}
    `.toLowerCase();

    const matchesSearch = text.includes(searchValue);
    const matchesStatus = !statusValue || (item.status || "").toLowerCase() === statusValue;

    return matchesSearch && matchesStatus;
  });

  renderSubmissions(filtered);
};

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
