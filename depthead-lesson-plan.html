<!DOCTYPE html>
<html>
<head>
<title>Department Head - Lesson Plan</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eef4fb;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:240px;
background:#004aad;
color:white;
padding:20px;
}

.sidebar h3{
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.15);
color:white;
cursor:pointer;
font-weight:bold;
}

.sidebar button:hover{
background:rgba(255,255,255,0.3);
}

.content{
flex:1;
padding:30px;
}

.page-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h2{
color:#004aad;
margin:0;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.saveBtn{
background:#004aad;
color:white;
}

.submitBtn{
background:#0b8f3c;
color:white;
}

.exportBtn{
background:#555;
color:white;
}

.logBtn{
background:#f39c12;
color:white;
}

textarea{
width:100%;
height:400px;
padding:10px;
font-family:Arial;
border:1px solid #ccc;
border-radius:6px;
}

.status{
margin-top:15px;
font-weight:bold;
color:#004aad;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h3>Dept Head Portal</h3>

<button onclick="location.href='checker-dashboard.html'">Dashboard</button>

<button onclick="location.href='depthead-profile.html'">My Profile</button>

<button onclick="location.href='depthead-lesson-plan.html'">My Lesson Plan</button>

<button onclick="location.href='depthead-lesson-log-history.html'">Lesson Log</button>

<button onclick="location.href='teacher-submissions.html'">Teacher Submissions</button>

<button onclick="location.href='checker-review-list.html'">Review Queue</button>

<button onclick="logout()">Logout</button>

</div>

<div class="content">

<div class="page-card">

<div class="header">

<h2>Department Head Lesson Plan</h2>

<div class="actions">

<button class="logBtn" onclick="openLessonLog()">Lesson Log</button>

<button class="saveBtn" onclick="saveLesson()">Save Draft</button>

<button class="submitBtn" onclick="submitLesson()">Submit to School Head</button>

<button class="exportBtn" onclick="exportLesson()">Export</button>

</div>

</div>

<textarea id="lessonContent" placeholder="Write your lesson plan here..."></textarea>

<div class="status" id="statusMsg"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,collection,addDoc,serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
authDomain: "teachers-portal-98254.firebaseapp.com",
projectId: "teachers-portal-98254",
storageBucket: "teachers-portal-98254.firebasestorage.app",
messagingSenderId: "479254583768",
appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser=user;

loadDraft();

});

function loadDraft(){

const draft = localStorage.getItem("deptHeadLessonDraft");

if(draft){
document.getElementById("lessonContent").value = draft;
}

}

window.saveLesson=function(){

const content = document.getElementById("lessonContent").value;

localStorage.setItem("deptHeadLessonDraft",content);

document.getElementById("statusMsg").innerText="Draft saved.";

}

window.submitLesson=async function(){

const content = document.getElementById("lessonContent").value;

if(!content){
alert("Lesson content is empty.");
return;
}

try{

await addDoc(collection(db,"lessonPlans"),{

userId:currentUser.uid,
content:content,
status:"for_approval",
submittedByRole:"department_head",
submittedAt:serverTimestamp()

});

localStorage.removeItem("deptHeadLessonDraft");

document.getElementById("statusMsg").innerText="Submitted to School Head.";

document.getElementById("lessonContent").value="";

}catch(err){

console.error(err);
alert("Submission failed.");

}

}

window.exportLesson=function(){

const content=document.getElementById("lessonContent").value;

const html=`

<html>

<body>

<h2>Department Head Lesson Plan</h2>

<p>${content.replace(/\n/g,"<br>")}</p>

</body>

</html>

`;

const blob=new Blob([html],{type:"application/msword"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="Department_Head_Lesson_Plan.doc";

a.click();

}

window.openLessonLog=function(){

window.location.href="depthead-lesson-log-history.html";

}

window.logout=function(){

signOut(auth).then(()=>{

window.location.href="login.html";

});

}

</script>

</body>
</html>
