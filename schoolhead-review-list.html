<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approve DLL Queue</title>
  <link rel="icon" type="image/png" href="images/deped-favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef4fb;
      color: #1f2937;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #004aad 0%, #00357b 100%);
      color: white;
      padding: 22px 18px;
      box-shadow: 2px 0 16px rgba(0,0,0,0.12);
    }

    .sidebar h3 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 22px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.14);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.26);
      transform: translateY(-1px);
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    .page-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    .page-title {
      margin: 0 0 18px;
      font-size: 28px;
      color: #004aad;
      font-weight: 800;
    }

    .subtext {
      margin-bottom: 18px;
      color: #64748b;
      font-size: 14px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search-box {
      padding: 10px 12px;
      border: 1px solid #cdd9ea;
      border-radius: 10px;
      width: 300px;
      font-size: 14px;
    }

    .summary-box {
      background: #edf4ff;
      color: #004aad;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #d6e2f0;
      padding: 10px 8px;
      font-size: 14px;
      text-align: left;
      vertical-align: middle;
      word-wrap: break-word;
    }

    th {
      background: #edf4ff;
      color: #1e293b;
      font-weight: 800;
      text-align: center;
    }

    td.center {
      text-align: center;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .for-approval {
      background: #fff4d6;
      color: #9a6700;
    }

    .review-btn {
      border: none;
      background: #004aad;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .review-btn:hover {
      background: #00357b;
    }

    .empty-state {
      text-align: center;
      padding: 22px;
      color: #64748b;
    }

    #message {
      margin-top: 16px;
      font-weight: bold;
      color: red;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }

      .search-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h3>School Head Portal</h3>
    <button onclick="location.href='approver-dashboard.html'">Dashboard</button>
    <button onclick="location.href='schoolhead-profile.html'">My Profile</button>
    <button onclick="location.href='teacher-submissions-schoolhead.html'">Teacher Submission</button>
    <button onclick="location.href='schoolhead-review-list.html'">Approve DLL</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="page-card">
      <h1 class="page-title">Approve DLL Queue</h1>
      <div class="subtext">These DLLs were checked by Department Heads and are now waiting for final approval.</div>

      <div class="top-bar">
        <input
          type="text"
          id="searchInput"
          class="search-box"
          placeholder="Search by teacher, subject, grade, or quarter..."
          oninput="renderQueue()"
        />
        <div class="summary-box">
          Pending for Approval: <span id="pendingCount">0</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 18%;">Teacher</th>
              <th style="width: 10%;">Grade</th>
              <th style="width: 16%;">Learning Area</th>
              <th style="width: 10%;">Quarter</th>
              <th style="width: 16%;">Date Range</th>
              <th style="width: 13%;">Checked By</th>
              <th style="width: 10%;">Status</th>
              <th style="width: 12%;">Submitted At</th>
              <th style="width: 10%;">Action</th>
            </tr>
          </thead>
          <tbody id="queueBody">
            <tr>
              <td colspan="9" class="empty-state">Loading queue...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="message"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
    authDomain: "teachers-portal-98254.firebaseapp.com",
    projectId: "teachers-portal-98254",
    storageBucket: "teachers-portal-98254.firebasestorage.app",
    messagingSenderId: "479254583768",
    appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentProfile = null;
  let queueItems = [];

  function normalizeText(value) {
    return (value || "").toString().trim().toLowerCase();
  }

  function setMessage(text, color = "red") {
    const el = document.getElementById("message");
    el.innerText = text;
    el.style.color = color;
  }

  function formatReadableDateTime(dateValue) {
    if (!dateValue) return "";
    const d = new Date(dateValue);
    if (isNaN(d.getTime())) return "";

    return d.toLocaleString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
  }

  async function preloadQueue() {
    const lessonsSnap = await getDocs(collection(db, "lessonPlans"));
    const currentSchoolId = (currentProfile.schoolId || "").trim();

    queueItems = [];

    lessonsSnap.forEach((docSnap) => {
      const data = docSnap.data();
      const itemSchoolId = (data.schoolId || "").trim();
      const status = normalizeText(data.status);

      if (itemSchoolId === currentSchoolId && status === "for_approval") {
        queueItems.push({
          id: docSnap.id,
          ...data
        });
      }
    });

    queueItems.sort((a, b) => {
      const aTime = new Date(a.submittedAt || a.checkedAt || 0).getTime();
      const bTime = new Date(b.submittedAt || b.checkedAt || 0).getTime();
      return bTime - aTime;
    });
  }

  window.renderQueue = function () {
    const tbody = document.getElementById("queueBody");
    const searchText = normalizeText(document.getElementById("searchInput").value);

    const filtered = queueItems.filter(item => {
      const combined = normalizeText(
        `${item.teacherName || ""} ${item.learningArea || ""} ${item.grade || ""} ${item.quarter || ""} ${item.checkedBy || ""}`
      );
      return combined.includes(searchText);
    });

    document.getElementById("pendingCount").innerText = filtered.length;

    if (!filtered.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="9" class="empty-state">No DLLs found in the approval queue.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = filtered.map(item => `
      <tr>
        <td>${item.teacherName || ""}</td>
        <td class="center">${item.grade || ""}</td>
        <td>${item.learningArea || ""}</td>
        <td class="center">${item.quarter || ""}</td>
        <td>${item.dateRange || ""}</td>
        <td>${item.checkedBy || item.assignedDepartmentHead || ""}</td>
        <td class="center">
          <span class="status-badge for-approval">For Approval</span>
        </td>
        <td>${formatReadableDateTime(item.submittedAt || item.checkedAt)}</td>
        <td class="center">
          <button class="review-btn" onclick="openReview('${item.id}')">Review</button>
        </td>
      </tr>
    `).join("");
  };

  window.openReview = function (docId) {
    window.location.href = `schoolhead-review.html?docId=${encodeURIComponent(docId)}`;
  };

  window.logout = function () {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = user;

    try {
      const userSnap = await getDoc(doc(db, "users", user.uid));

      if (!userSnap.exists()) {
        window.location.href = "login.html";
        return;
      }

      currentProfile = userSnap.data();

      if (currentProfile.role !== "school_head" && currentProfile.role !== "super_admin") {
        alert("Access denied.");
        window.location.href = "login.html";
        return;
      }

      await preloadQueue();
      renderQueue();

    } catch (error) {
      console.error(error);
      setMessage("Failed to load approval queue.");
    }
  });
</script>

</body>
</html>
