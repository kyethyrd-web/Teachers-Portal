<!DOCTYPE html>
<html>
<head>
  <title>Review Queue</title>
  <link rel="icon" type="image/png" href="images/deped-favicon.png">
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#eef4fb;
      color:#333;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:240px;
      background:#004aad;
      color:white;
      padding:20px;
      box-shadow:2px 0 10px rgba(0,0,0,0.1);
    }

    .sidebar h3{
      margin-top:0;
      margin-bottom:20px;
      text-align:center;
      font-size:22px;
    }

    .sidebar button{
      width:100%;
      margin-bottom:12px;
      padding:12px;
      cursor:pointer;
      border:none;
      border-radius:8px;
      background:rgba(255,255,255,0.15);
      color:white;
      font-weight:bold;
      font-size:14px;
      transition:0.2s;
    }

    .sidebar button:hover{
      background:rgba(255,255,255,0.28);
    }

    .content{
      flex:1;
      padding:30px;
    }

    .page-card{
      background:white;
      border-radius:14px;
      padding:25px;
      box-shadow:0 6px 18px rgba(0,0,0,0.1);
    }

    .page-header{
      margin-bottom:20px;
    }

    .page-header h2{
      margin:0;
      color:#004aad;
      font-size:28px;
    }

    .page-header p{
      margin-top:8px;
      color:#666;
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .toolbar input{
      padding:10px 12px;
      border:1px solid #c8d7ea;
      border-radius:8px;
      font-size:14px;
      min-width:280px;
      flex:1;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    th, td{
      border:1px solid #dce7f5;
      padding:12px;
      text-align:left;
      font-size:14px;
      vertical-align:middle;
    }

    th{
      background:#f2f7ff;
      color:#004aad;
    }

    .status{
      font-weight:bold;
      text-transform:capitalize;
      color:#0b8f3c;
    }

    .review-btn{
      background:#004aad;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      font-size:13px;
    }

    .review-btn:hover{
      background:#00307a;
    }

    .empty{
      text-align:center;
      color:#666;
      padding:20px;
    }

    #message{
      margin-top:15px;
      font-weight:bold;
      color:red;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h3>Dept Head Portal</h3>
    <button onclick="location.href='checker-dashboard.html'">Dashboard</button>
    <button onclick="location.href='depthead-profile.html'">My Profile</button>
    <button onclick="location.href='depthead-lesson-plan.html'">My Lesson Plan</button>
    <button onclick="location.href='teacher-submissions.html'">Teacher Submissions</button>
    <button onclick="location.href='checker-review-list.html'">Review Queue</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="page-card">

      <div class="page-header">
        <h2>Review Queue</h2>
        <p>Lesson plans waiting for your review and checking.</p>
      </div>

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search teacher, grade, subject, date..."
          oninput="filterQueue()"
        >
      </div>

      <table>
        <thead>
          <tr>
            <th>Teacher</th>
            <th>Grade</th>
            <th>Learning Area</th>
            <th>Quarter</th>
            <th>Date Range</th>
            <th>Status</th>
            <th>Submitted At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="queueTableBody">
          <tr>
            <td colspan="8" class="empty">Loading review queue...</td>
          </tr>
        </tbody>
      </table>

      <div id="message"></div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
  authDomain: "teachers-portal-98254.firebaseapp.com",
  projectId: "teachers-portal-98254",
  storageBucket: "teachers-portal-98254.firebasestorage.app",
  messagingSenderId: "479254583768",
  appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let currentProfile;
let allQueueItems = [];

function setMessage(text, color = "red"){
  const message = document.getElementById("message");
  message.style.color = color;
  message.innerText = text;
}

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  const userSnap = await getDoc(doc(db, "users", user.uid));
  if(!userSnap.exists()){
    window.location.href = "login.html";
    return;
  }

  currentProfile = userSnap.data();

  if(currentProfile.role !== "department_head" && currentProfile.role !== "super_admin"){
    alert("Access denied.");
    window.location.href = "login.html";
    return;
  }

  loadReviewQueue();
});

async function loadReviewQueue(){
  try{
    const snap = await getDocs(collection(db, "lessonPlans"));

    const currentSchoolId = (currentProfile.schoolId || "").trim();
    const currentDeptHeadName = (currentProfile.name || "").trim().toLowerCase();

    allQueueItems = [];

    snap.forEach(docSnap => {
      const data = docSnap.data();

      const lessonSchoolId = (data.schoolId || "").trim();
      const lessonDeptHead = (data.assignedDepartmentHead || "").trim().toLowerCase();

      const belongsToThisDeptHead =
        lessonSchoolId === currentSchoolId &&
        lessonDeptHead === currentDeptHeadName;

      const isWaitingForReview = (data.status || "").toLowerCase() === "submitted";

      if(belongsToThisDeptHead && isWaitingForReview){
        allQueueItems.push({
          id: docSnap.id,
          ...data
        });
      }
    });

    allQueueItems.sort((a, b) => {
      return (b.submittedAt || "").localeCompare(a.submittedAt || "");
    });

    renderQueue(allQueueItems);

  }catch(error){
    console.error("Review queue load error:", error);
    setMessage("Failed to load review queue.");
  }
}

function renderQueue(items){
  const tbody = document.getElementById("queueTableBody");

  if(items.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="8" class="empty">No lesson plans waiting for review.</td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = "";

  items.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.teacherName || ""}</td>
      <td>${item.grade || ""}</td>
      <td>${item.learningArea || ""}</td>
      <td>${item.quarter || ""}</td>
      <td>${item.dateRange || ""}</td>
      <td><span class="status">${item.status || ""}</span></td>
      <td>${item.submittedAt || "-"}</td>
      <td>
        <button class="review-btn" onclick="reviewLesson('${item.id}')">Review</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

window.filterQueue = function(){
  const searchValue = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allQueueItems.filter(item => {
    const text = `
      ${item.teacherName || ""}
      ${item.grade || ""}
      ${item.learningArea || ""}
      ${item.quarter || ""}
      ${item.dateRange || ""}
      ${item.status || ""}
    `.toLowerCase();

    return text.includes(searchValue);
  });

  renderQueue(filtered);
};

window.reviewLesson = function(docId){
  window.location.href = "checker-review.html?docId=" + docId;
};

window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
