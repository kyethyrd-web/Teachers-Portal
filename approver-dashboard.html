<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Head Dashboard</title>
  <link rel="icon" type="image/png" href="images/deped-favicon.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef4fb;
      color: #1f2937;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #004aad 0%, #00357b 100%);
      color: white;
      padding: 22px 18px;
      box-shadow: 2px 0 16px rgba(0, 0, 0, 0.12);
    }

    .sidebar h3 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 22px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.14);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.26);
      transform: translateY(-1px);
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    .welcome-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      margin-bottom: 22px;
    }

    .welcome-card h1 {
      margin: 0 0 8px;
      color: #004aad;
      font-size: 30px;
    }

    .welcome-card p {
      margin: 6px 0;
      color: #475569;
      font-size: 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.10);
      border-left: 6px solid #004aad;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #334155;
    }

    .card .number {
      font-size: 34px;
      font-weight: 800;
      color: #004aad;
    }

    .section {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      margin-bottom: 22px;
    }

    .section h2 {
      margin: 0 0 14px;
      color: #004aad;
      font-size: 22px;
    }

    .notif-list {
      display: grid;
      gap: 12px;
    }

    .notif-item {
      background: #f7fbff;
      border: 1px solid #d9e8fb;
      border-left: 5px solid #004aad;
      border-radius: 12px;
      padding: 14px;
    }

    .notif-item strong {
      display: block;
      margin-bottom: 4px;
      color: #1e293b;
    }

    .notif-item span {
      font-size: 13px;
      color: #64748b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th, td {
      border: 1px solid #d6e2f0;
      padding: 10px 8px;
      font-size: 14px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #edf4ff;
      color: #1e293b;
      font-weight: 700;
    }

    .status-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .for-approval {
      background: #fff4d6;
      color: #9a6700;
    }

    .approved {
      background: #dcfce7;
      color: #166534;
    }

    .empty-state {
      color: #64748b;
      font-size: 14px;
      padding: 8px 0;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
      color: red;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h3>School Head Portal</h3>
    <button onclick="location.href='approver-dashboard.html'">Dashboard</button>
    <button onclick="location.href='schoolhead-profile.html'">My Profile</button>
    <button onclick="location.href='teacher-submissions-schoolhead.html'">Teacher Submission</button>
    <button onclick="location.href='schoolhead-review-list.html'">Approve DLL</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="welcome-card">
      <h1>School Head Dashboard</h1>
      <p><strong id="welcomeName">Welcome</strong></p>
      <p id="schoolInfo">School Name</p>
      <p id="schoolIdInfo">School ID: ______</p>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Pending Final Approvals</h3>
        <div class="number" id="pendingCount">0</div>
      </div>

      <div class="card">
        <h3>Approved This Week</h3>
        <div class="number" id="approvedThisWeekCount">0</div>
      </div>

      <div class="card">
        <h3>Submitted This Week</h3>
        <div class="number" id="submittedThisWeekCount">0</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Notifications</h2>
      <div id="notifications" class="notif-list">
        <div class="empty-state">Loading notifications...</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent DLLs for Final Approval</h2>
      <div id="recentTableWrap">
        <div class="empty-state">Loading records...</div>
      </div>
    </div>

    <div id="message"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
    authDomain: "teachers-portal-98254.firebaseapp.com",
    projectId: "teachers-portal-98254",
    storageBucket: "teachers-portal-98254.firebasestorage.app",
    messagingSenderId: "479254583768",
    appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentProfile = null;
  let lessonPlans = [];

  function setMessage(text, color = "red") {
    const el = document.getElementById("message");
    el.innerText = text;
    el.style.color = color;
  }

  function normalizeText(value) {
    return (value || "").toString().trim().toLowerCase();
  }

  function getMonday(dateInput = new Date()) {
    const d = new Date(dateInput);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function getFriday(monday) {
    const friday = new Date(monday);
    friday.setDate(monday.getDate() + 4);
    friday.setHours(23, 59, 59, 999);
    return friday;
  }

  function isWithinThisWeek(dateValue) {
    if (!dateValue) return false;
    const d = new Date(dateValue);
    if (isNaN(d.getTime())) return false;

    const monday = getMonday(new Date());
    const friday = getFriday(monday);

    return d >= monday && d <= friday;
  }

  function formatReadableDate(dateValue) {
    if (!dateValue) return "";
    const d = new Date(dateValue);
    if (isNaN(d.getTime())) return "";

    return d.toLocaleDateString("en-US", {
      month: "long",
      day: "numeric",
      year: "numeric"
    });
  }

  function formatReadableDateTime(dateValue) {
    if (!dateValue) return "";
    const d = new Date(dateValue);
    if (isNaN(d.getTime())) return "";

    return d.toLocaleString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
  }

  function loadHeaderInfo() {
    document.getElementById("welcomeName").innerText =
      `Welcome, ${currentProfile.name || "School Head"}`;

    document.getElementById("schoolInfo").innerText =
      currentProfile.school || "School Name";

    document.getElementById("schoolIdInfo").innerText =
      `School ID: ${currentProfile.schoolId || "______"}`;
  }

  async function preloadLessonPlans() {
    const snap = await getDocs(collection(db, "lessonPlans"));
    lessonPlans = [];

    const currentSchoolId = (currentProfile.schoolId || "").trim();
    const currentApproverName = normalizeText(currentProfile.name);

    snap.forEach((docSnap) => {
      const data = docSnap.data();
      const itemSchoolId = (data.schoolId || "").trim();
      const itemAssignedApprover = normalizeText(data.assignedApprover);
      const submittedByRole = normalizeText(data.submittedByRole);

      const sameSchool = itemSchoolId === currentSchoolId;
      const approverMatches =
        !itemAssignedApprover || itemAssignedApprover === currentApproverName;

      if (sameSchool && approverMatches) {
        lessonPlans.push({
          id: docSnap.id,
          ...data
        });
      }
    });
  }

  function renderSummaryCards() {
    const pending = lessonPlans.filter(item =>
      normalizeText(item.status) === "for_approval"
    ).length;

    const approvedThisWeek = lessonPlans.filter(item =>
      normalizeText(item.status) === "approved" &&
      isWithinThisWeek(item.approvedAt)
    ).length;

    const submittedThisWeek = lessonPlans.filter(item =>
      normalizeText(item.status) === "for_approval" &&
      isWithinThisWeek(item.submittedAt)
    ).length;

    document.getElementById("pendingCount").innerText = pending;
    document.getElementById("approvedThisWeekCount").innerText = approvedThisWeek;
    document.getElementById("submittedThisWeekCount").innerText = submittedThisWeek;
  }

  function renderNotifications() {
    const container = document.getElementById("notifications");

    const notificationItems = lessonPlans
      .filter(item =>
        ["for_approval", "approved"].includes(normalizeText(item.status))
      )
      .sort((a, b) => {
        const aTime = new Date(a.approvedAt || a.submittedAt || 0).getTime();
        const bTime = new Date(b.approvedAt || b.submittedAt || 0).getTime();
        return bTime - aTime;
      })
      .slice(0, 6);

    if (!notificationItems.length) {
      container.innerHTML = `<div class="empty-state">No recent notifications.</div>`;
      return;
    }

    container.innerHTML = notificationItems.map(item => {
      const status = normalizeText(item.status);

      if (status === "for_approval") {
        return `
          <div class="notif-item">
            <strong>${item.teacherName || "A Department Head"} submitted a DLL for final approval.</strong>
            <span>${item.learningArea || "Learning Area"} ${item.grade || ""} • ${item.dateRange || ""}</span>
          </div>
        `;
      }

      if (status === "approved") {
        return `
          <div class="notif-item">
            <strong>${item.teacherName || "A submission"} was approved by School Head.</strong>
            <span>${item.learningArea || "Learning Area"} ${item.grade || ""} • ${formatReadableDateTime(item.approvedAt)}</span>
          </div>
        `;
      }

      return "";
    }).join("");
  }

  function renderRecentTable() {
    const wrap = document.getElementById("recentTableWrap");

    const rows = lessonPlans
      .filter(item => normalizeText(item.status) === "for_approval")
      .sort((a, b) => {
        const aTime = new Date(a.submittedAt || 0).getTime();
        const bTime = new Date(b.submittedAt || 0).getTime();
        return bTime - aTime;
      })
      .slice(0, 8);

    if (!rows.length) {
      wrap.innerHTML = `<div class="empty-state">No DLLs currently waiting for final approval.</div>`;
      return;
    }

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Teacher</th>
            <th>Grade</th>
            <th>Learning Area</th>
            <th>Quarter</th>
            <th>Date Range</th>
            <th>Status</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(item => `
            <tr>
              <td>${item.teacherName || ""}</td>
              <td>${item.grade || ""}</td>
              <td>${item.learningArea || ""}</td>
              <td>${item.quarter || ""}</td>
              <td>${item.dateRange || ""}</td>
              <td><span class="status-badge for-approval">For Approval</span></td>
              <td>${formatReadableDateTime(item.submittedAt)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  window.logout = function () {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = user;

    try {
      const userSnap = await getDoc(doc(db, "users", user.uid));

      if (!userSnap.exists()) {
        window.location.href = "login.html";
        return;
      }

      currentProfile = userSnap.data();

      if (currentProfile.role !== "school_head" && currentProfile.role !== "super_admin") {
        alert("Access denied.");
        window.location.href = "login.html";
        return;
      }

      loadHeaderInfo();
      await preloadLessonPlans();
      renderSummaryCards();
      renderNotifications();
      renderRecentTable();

    } catch (error) {
      console.error(error);
      setMessage("Failed to load dashboard.");
    }
  });
</script>

</body>
</html>
