<!DOCTYPE html>
<html>
<head>
  <title>Department Head Dashboard</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#333;
    }

    .header{
      background:#004aad;
      color:white;
      padding:20px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .header h1{
      margin:0;
      font-size:24px;
    }

    .header .user-info{
      font-size:14px;
      text-align:right;
    }

    .navbar{
      display:flex;
      gap:10px;
      padding:15px 30px;
      background:white;
      border-bottom:1px solid #ddd;
      flex-wrap:wrap;
    }

    .navbar button{
      background:#004aad;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    .navbar button:hover{
      background:#00307a;
    }

    .container{
      padding:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .card h3{
      margin:0 0 10px 0;
      color:#004aad;
      font-size:18px;
    }

    .card .count{
      font-size:30px;
      font-weight:bold;
    }

    .section{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .section h2{
      margin-top:0;
      color:#004aad;
    }

    ul{
      padding-left:20px;
    }

    li{
      margin-bottom:8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Department Head Dashboard</h1>
    <div class="user-info">
      <div id="deptHeadName">Loading...</div>
      <div id="deptHeadSchool"></div>
    </div>
  </div>

  <div class="navbar">
    <button onclick="goToDashboard()">Dashboard</button>
    <button onclick="goToProfile()">My Profile</button>
    <button onclick="goToMyLessonPlan()">My Lesson Plan</button>
    <button onclick="goToTeacherSubmissions()">Teacher Submissions</button>
    <button onclick="goToReviewQueue()">Review Queue</button>
  </div>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Pending Reviews</h3>
        <div class="count" id="pendingReviewsCount">0</div>
      </div>

      <div class="card">
        <h3>Returned Lesson Plans</h3>
        <div class="count" id="returnedCount">0</div>
      </div>

      <div class="card">
        <h3>Submitted This Week</h3>
        <div class="count" id="submittedThisWeekCount">0</div>
      </div>

      <div class="card">
        <h3>My Own Lesson Plans</h3>
        <div class="count" id="myOwnPlansCount">0</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Notifications</h2>
      <ul id="notificationsList">
        <li>Loading notifications...</li>
      </ul>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
      authDomain: "teachers-portal-98254.firebaseapp.com",
      projectId: "teachers-portal-98254",
      storageBucket: "teachers-portal-98254.firebasestorage.app",
      messagingSenderId: "479254583768",
      appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser;
    let currentProfile;

    onAuthStateChanged(auth, async (user) => {
      if(!user){
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      const snap = await getDoc(doc(db, "users", user.uid));
      if(snap.exists()){
        currentProfile = snap.data();

        document.getElementById("deptHeadName").innerText =
          currentProfile.name || "Department Head";

        document.getElementById("deptHeadSchool").innerText =
          currentProfile.school || "";
      }

      loadPlaceholderNotifications();
    });

    function loadPlaceholderNotifications(){
      document.getElementById("notificationsList").innerHTML = `
        <li>You are logged in successfully.</li>
        <li>Pending review counts will appear here.</li>
        <li>Teacher submission updates will appear here.</li>
      `;
    }

    window.goToDashboard = function(){
      window.location.href = "checker-dashboard.html";
    };

    window.goToProfile = function(){
      window.location.href = "depthead-profile.html";
    };

    window.goToMyLessonPlan = function(){
      window.location.href = "depthead-lesson-plan.html";
    };

    window.goToTeacherSubmissions = function(){
      window.location.href = "teacher-submissions.html";
    };

    window.goToReviewQueue = function(){
      window.location.href = "checker-review-list.html";
    };

    window.goHome = function(){
      window.location.href = "profile.html";
    };
  </script>

</body>
</html>
