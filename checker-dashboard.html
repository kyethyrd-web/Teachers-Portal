<!DOCTYPE html>
<html>
<head>
  <title>Department Head Dashboard</title>
  <link rel="icon" type="image/png" href="images/deped-favicon.png">
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#333;
    }

    .header{
      background:#004aad;
      color:white;
      padding:20px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .header h1{
      margin:0;
      font-size:24px;
    }

    .header .user-info{
      font-size:14px;
      text-align:right;
    }

    .navbar{
      display:flex;
      gap:10px;
      padding:15px 30px;
      background:white;
      border-bottom:1px solid #ddd;
      flex-wrap:wrap;
    }

    .navbar button{
      background:#004aad;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
    }

    .navbar button:hover{
      background:#00307a;
    }

    .container{
      padding:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .card h3{
      margin:0 0 10px 0;
      color:#004aad;
      font-size:18px;
    }

    .card .count{
      font-size:30px;
      font-weight:bold;
    }

    .section{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .section h2{
      margin-top:0;
      color:#004aad;
    }

    ul{
      padding-left:20px;
    }

    li{
      margin-bottom:8px;
    }

    #message{
      margin-top:15px;
      color:red;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Department Head Dashboard</h1>
    <div class="user-info">
      <div id="deptHeadName">Loading...</div>
      <div id="deptHeadSchool"></div>
    </div>
  </div>

  <div class="navbar">
    <button onclick="goToDashboard()">Dashboard</button>
    <button onclick="goToProfile()">My Profile</button>
    <button onclick="goToMyLessonPlan()">My Lesson Plan</button>
    <button onclick="goToTeacherSubmissions()">Teacher Submissions</button>
    <button onclick="goToReviewQueue()">Review Queue</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Pending Reviews</h3>
        <div class="count" id="pendingReviewsCount">0</div>
      </div>

      <div class="card">
        <h3>Returned Lesson Plans</h3>
        <div class="count" id="returnedCount">0</div>
      </div>

      <div class="card">
        <h3>Submitted This Week</h3>
        <div class="count" id="submittedThisWeekCount">0</div>
      </div>
    </div>

    <div class="section">
      <h2>Recent Notifications</h2>
      <ul id="notificationsList">
        <li>Loading notifications...</li>
      </ul>
      <div id="message"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
      authDomain: "teachers-portal-98254.firebaseapp.com",
      projectId: "teachers-portal-98254",
      storageBucket: "teachers-portal-98254.firebasestorage.app",
      messagingSenderId: "479254583768",
      appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser;
    let currentProfile;

    function setMessage(text, color = "red"){
      const el = document.getElementById("message");
      if(el){
        el.style.color = color;
        el.innerText = text;
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if(!user){
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try{
        const snap = await getDoc(doc(db, "users", user.uid));

        if(!snap.exists()){
          window.location.href = "login.html";
          return;
        }

        currentProfile = snap.data();

        if(currentProfile.role !== "department_head" && currentProfile.role !== "super_admin"){
          alert("Access denied.");
          window.location.href = "login.html";
          return;
        }

        document.getElementById("deptHeadName").innerText =
          currentProfile.name || "Department Head";

        document.getElementById("deptHeadSchool").innerText =
          currentProfile.school || "";

        loadDashboardData();

      }catch(error){
        console.error("Auth/Profile load error:", error);
        setMessage("Failed to load dashboard profile.");
      }
    });

    async function loadDashboardData(){
      try{
        const snap = await getDocs(collection(db, "lessonPlans"));

        const currentSchoolId = (currentProfile.schoolId || "").trim();
        const currentDeptHeadName = (currentProfile.name || "").trim().toLowerCase();

        let pendingReviews = 0;
        let returnedCount = 0;
        let submittedThisWeek = 0;
        let notifications = [];

        const today = new Date();
        const monday = new Date(today);
        const day = monday.getDay();
        const diff = monday.getDate() - day + (day === 0 ? -6 : 1);
        monday.setDate(diff);
        monday.setHours(0,0,0,0);

        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23,59,59,999);

        snap.forEach(docSnap => {
          const data = docSnap.data();

          const lessonSchoolId = (data.schoolId || "").trim();
          const lessonDeptHead = (data.assignedDepartmentHead || "").trim().toLowerCase();

          const belongsToThisDeptHead =
            lessonSchoolId === currentSchoolId &&
            lessonDeptHead === currentDeptHeadName;

          if(belongsToThisDeptHead){
            if(data.status === "submitted"){
              pendingReviews++;
            }

            if(data.status === "returned"){
              returnedCount++;
            }

            if(data.status === "submitted" && data.submittedAt){
              const submittedDate = new Date(data.submittedAt);
              if(!isNaN(submittedDate) && submittedDate >= monday && submittedDate <= sunday){
                submittedThisWeek++;
              }
            }

            notifications.push({
              teacherName: data.teacherName || "Unknown Teacher",
              learningArea: data.learningArea || "",
              grade: data.grade || "",
              dateRange: data.dateRange || "",
              submittedAt: data.submittedAt || "",
              status: data.status || ""
            });
          }
        });

        const pendingEl = document.getElementById("pendingReviewsCount");
        const returnedEl = document.getElementById("returnedCount");
        const submittedWeekEl = document.getElementById("submittedThisWeekCount");

        if(pendingEl) pendingEl.innerText = pendingReviews;
        if(returnedEl) returnedEl.innerText = returnedCount;
        if(submittedWeekEl) submittedWeekEl.innerText = submittedThisWeek;

        renderNotifications(notifications);

      }catch(error){
        console.error("Dashboard load error:", error);
        document.getElementById("notificationsList").innerHTML =
          `<li>Failed to load dashboard notifications: ${error.message}</li>`;
      }
    }

    function renderNotifications(notifications){
      const list = document.getElementById("notificationsList");

      if(!list) return;

      if(!notifications.length){
        list.innerHTML = "<li>No recent submission notifications.</li>";
        return;
      }

      notifications.sort((a, b) => {
        return (b.submittedAt || "").localeCompare(a.submittedAt || "");
      });

      const recent = notifications.slice(0, 5);

      list.innerHTML = recent.map(item => `
        <li>
          <strong>${item.teacherName}</strong> submitted
          <strong>Grade ${item.grade} ${item.learningArea}</strong>
          for <strong>${item.dateRange}</strong>
          (${item.status})
        </li>
      `).join("");
    }

    window.goToDashboard = function(){
      window.location.href = "checker-dashboard.html";
    };

    window.goToProfile = function(){
      window.location.href = "depthead-profile.html";
    };

    window.goToMyLessonPlan = function(){
      window.location.href = "depthead-lesson-plan.html";
    };

    window.goToTeacherSubmissions = function(){
      window.location.href = "teacher-submissions.html";
    };

    window.goToReviewQueue = function(){
      window.location.href = "checker-review-list.html";
    };

    window.logout = function(){
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };
  </script>

</body>
</html>
