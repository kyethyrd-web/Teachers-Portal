<!DOCTYPE html>
<html>
<head>
  <title>Department Head Portal - Profile</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dceeff;
      min-height: 100vh;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #004aad;
      color: white;
      padding: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }

    .sidebar h3 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-size: 22px;
    }

    .sidebar button {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.28);
    }

    .content {
      flex: 1;
      padding: 30px;
    }

    .page-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 30px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .page-header h2 {
      margin: 0;
      color: #004aad;
      font-size: 30px;
    }

    .profile-top {
      display: flex;
      justify-content: center;
      margin-bottom: 25px;
    }

    .profile-pic-container {
      text-align: center;
    }

    #profilePic {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #bcdcff;
      cursor: pointer;
      background: #f4f9ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
    }

    td {
      padding: 12px;
      border: 1px solid #e4edf7;
      vertical-align: middle;
    }

    td:first-child {
      width: 30%;
      font-weight: bold;
      background: #f3f8ff;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #c9d9ee;
      border-radius: 8px;
    }

    input:disabled {
      background: #f1f5f9;
    }

    .buttons {
      text-align: center;
    }

    button {
      padding: 12px 24px;
      margin: 6px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #editBtn {
      background: #004aad;
      color: white;
    }

    #saveBtn {
      background: #0b8f3c;
      color: white;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h3>Dept Head Portal</h3>

  <button onclick="location.href='checker-dashboard.html'">Dashboard</button>
  <button onclick="location.href='depthead-profile.html'">My Profile</button>
  <button onclick="location.href='depthead-lesson-plan.html'">My Lesson Plan</button>
  <button onclick="location.href='teacher-submissions.html'">Teacher Submissions</button>
  <button onclick="location.href='checker-review-list.html'">Review Queue</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="page-card">

<div class="page-header">
<h2>Department Head Profile</h2>
</div>

<div class="profile-top">
<div class="profile-pic-container">
<img id="profilePic" src="https://via.placeholder.com/160">
<input type="file" id="photoInput" accept="image/*" style="display:none;">
</div>
</div>

<div class="section-title">Personal Information</div>
<table>
<tr><td>Name</td><td><input id="name" disabled></td></tr>
<tr><td>DepEd Email Address</td><td><input id="depedEmail" disabled></td></tr>
<tr><td>Permanent Address</td><td><input id="permanentAddress" disabled></td></tr>
<tr><td>Mobile Phone</td><td><input id="mobilePhone" disabled></td></tr>
</table>

<div class="section-title">School Information</div>
<table>
<tr><td>Division</td><td><input id="division" disabled></td></tr>
<tr><td>District</td><td><input id="district" disabled></td></tr>
<tr><td>School</td><td><input id="school" disabled></td></tr>
<tr><td>School ID</td><td><input id="schoolId" disabled></td></tr>
<tr><td>School Head</td><td><input id="schoolHead" disabled></td></tr>
<tr><td>Department Head</td><td><input id="departmentHead" disabled></td></tr>
</table>

<div class="section-title">Government Information</div>
<table>
<tr><td>Employee ID</td><td><input id="employeeId" disabled></td></tr>
<tr><td>PRC License</td><td><input id="prcLicense" disabled></td></tr>
<tr><td>PhilHealth No.</td><td><input id="philhealth" disabled></td></tr>
<tr><td>TIN</td><td><input id="tin" disabled></td></tr>
<tr><td>GSIS BP No.</td><td><input id="gsis" disabled></td></tr>
<tr><td>Pag-IBIG No.</td><td><input id="pagibig" disabled></td></tr>
</table>

<div class="buttons">
<button id="editBtn" onclick="enableEdit()">Edit</button>
<button id="saveBtn" onclick="saveProfile()">Save Profile</button>
</div>

</div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
  authDomain: "teachers-portal-98254.firebaseapp.com",
  projectId: "teachers-portal-98254",
  storageBucket: "teachers-portal-98254.firebasestorage.app",
  messagingSenderId: "479254583768",
  appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser;

onAuthStateChanged(auth, async (user) => {

if(!user){
window.location.href="login.html";
return;
}

currentUser=user;

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){
window.location.href="login.html";
return;
}

const data=snap.data();

if(data.role !== "department_head" && data.role !== "super_admin"){
alert("Access denied.");
window.location.href="login.html";
return;
}

loadProfile();

});

async function loadProfile(){

const snap = await getDoc(doc(db,"users",currentUser.uid));

if(!snap.exists()) return;

const data = snap.data();

/* Personal */
document.getElementById("name").value = data.name || "";
document.getElementById("depedEmail").value = data.depedEmail || data.email || "";
document.getElementById("permanentAddress").value = data.permanentAddress || "";
document.getElementById("mobilePhone").value = data.mobilePhone || "";

/* School */
document.getElementById("division").value = data.division || "";
document.getElementById("district").value = data.district || "";
document.getElementById("school").value = data.school || "";
document.getElementById("schoolId").value = data.schoolId || "";
document.getElementById("schoolHead").value = data.schoolHead || "";
document.getElementById("departmentHead").value = data.departmentHead || "";

/* Government */
document.getElementById("employeeId").value = data.employeeId || "";
document.getElementById("prcLicense").value = data.prcLicense || "";
document.getElementById("philhealth").value = data.philhealth || "";
document.getElementById("tin").value = data.tin || "";
document.getElementById("gsis").value = data.gsis || "";
document.getElementById("pagibig").value = data.pagibig || "";

/* Photo */
if(data.photoURL){
document.getElementById("profilePic").src = data.photoURL;
}

}

window.enableEdit=function(){

document.querySelectorAll("input").forEach(input=>{
if(input.id!=="photoInput") input.disabled=false;
});

document.getElementById("editBtn").style.display="none";
document.getElementById("saveBtn").style.display="inline-block";

};

window.saveProfile=async function(){

const data={};

document.querySelectorAll("input").forEach(input=>{
if(input.id!=="photoInput"){
data[input.id]=input.value;
}
});

await setDoc(doc(db,"users",currentUser.uid),data,{merge:true});

document.querySelectorAll("input").forEach(input=>{
if(input.id!=="photoInput") input.disabled=true;
});

document.getElementById("editBtn").style.display="inline-block";
document.getElementById("saveBtn").style.display="none";

};

document.getElementById("profilePic").addEventListener("click",()=>{
document.getElementById("photoInput").click();
});

document.getElementById("photoInput").addEventListener("change",async function(){

const file=this.files[0];
if(!file) return;

const storageRef=ref(storage,`profilePics/${currentUser.uid}`);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

await setDoc(doc(db,"users",currentUser.uid),{photoURL:url},{merge:true});

document.getElementById("profilePic").src=url;

});

window.logout=function(){
signOut(auth).then(()=>window.location.href="login.html");
};

</script>

</body>
</html>
