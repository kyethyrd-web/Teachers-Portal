<!DOCTYPE html>
<html>
<head>
<title>DepEd Teacher Portal</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#dceeff;
position:relative;
}

/* Background DepEd watermark */

body::before{
content:"";
position:absolute;
inset:0;
background:url("images/DepEd-logo.png.png") center no-repeat;
background-size:600px;
opacity:0.05;
}

/* Main login container */

.login-container{
position:relative;
z-index:1;
width:900px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
overflow:hidden;
}

/* Left panel */

.left-panel{
flex:1;
background:#004aad;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.left-panel img{
width:130px;
margin-bottom:20px;
}

.left-panel h1{
margin:0;
font-size:34px;
}

.left-panel p{
margin-top:10px;
opacity:0.9;
}

/* Right login panel */

.right-panel{
flex:1;
padding:50px;
}

.right-panel h2{
margin-top:0;
color:#004aad;
}

/* Role buttons */

.role-buttons{
display:flex;
gap:10px;
margin-bottom:25px;
}

.role-btn{
flex:1;
padding:12px;
border:2px solid #004aad;
background:white;
color:#004aad;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.role-btn.active{
background:#004aad;
color:white;
}

.role-btn:hover{
background:#e6f0ff;
}

/* Input fields */

input{
width:100%;
padding:14px;
margin-bottom:16px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

input:focus{
outline:none;
border-color:#004aad;
}

/* Buttons */

.login-btn{
width:100%;
padding:14px;
background:#004aad;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.login-btn:hover{
background:#00307a;
}

.register-btn{
width:100%;
padding:12px;
margin-top:10px;
background:#eef5ff;
border:1px solid #004aad;
color:#004aad;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.register-btn:hover{
background:#ddeaff;
}

#message{
margin-top:10px;
font-size:14px;
color:red;
}

</style>
</head>

<body>

<div class="login-container">

<!-- LEFT SIDE -->

<div class="left-panel">

<img src="images/DepEd-logo.png.png">

<h1>Teacher Portal</h1>

<p>Department of Education<br>
Daily Lesson Log Management System</p>

</div>


<!-- RIGHT SIDE LOGIN -->

<div class="right-panel">

<h2>Login</h2>

<label>Select Role</label>

<div class="role-buttons">

<button class="role-btn active" onclick="setRole('teacher',this)">
Teacher
</button>

<button class="role-btn" onclick="setRole('department_head',this)">
Department Head
</button>

<button class="role-btn" onclick="setRole('school_head',this)">
School Head
</button>

</div>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>

<button class="register-btn" onclick="register()">Register</button>

<p id="message"></p>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
authDomain: "teachers-portal-98254.firebaseapp.com",
projectId: "teachers-portal-98254",
storageBucket: "teachers-portal-98254.firebasestorage.app",
messagingSenderId: "479254583768",
appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let selectedRole = "teacher";

window.setRole=function(role,btn){

selectedRole=role;

document.querySelectorAll(".role-btn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

};

window.login = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const user=await signInWithEmailAndPassword(auth,email,password);

const snap=await getDoc(doc(db,"users",user.user.uid));

const data=snap.data();

if(data.role !== selectedRole && data.role !== "super_admin"){
document.getElementById("message").innerText="Wrong role selected.";
return;
}

if(selectedRole==="teacher"){
window.location.href="profile.html";
}

if(selectedRole==="department_head"){
window.location.href="checker-dashboard.html";
}

if(selectedRole==="school_head"){
window.location.href="approver-dashboard.html";
}

}catch(error){

document.getElementById("message").innerText=error.message;

}

};

window.register = async function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

const user=await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",user.user.uid),{
email:email,
role:selectedRole
});

document.getElementById("message").innerText="Account created.";

}catch(error){

document.getElementById("message").innerText=error.message;

}

};

</script>

</body>
</html>
