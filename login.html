<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DepEd DLL System - Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dff1ff, #b9def7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: 30px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo-area img {
      width: 80px;
      opacity: 0.9;
    }

    h2 {
      margin: 10px 0 20px;
      text-align: center;
      color: #0b5fa5;
    }

    h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #0b5fa5;
      border-bottom: 2px solid #d6ecfb;
      padding-bottom: 6px;
      font-size: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      margin-top: 12px;
      color: #333;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #c7dceb;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0b5fa5;
      box-shadow: 0 0 0 3px rgba(11,95,165,0.12);
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary {
      background: #0b5fa5;
      color: white;
    }

    .btn-primary:hover {
      background: #094d86;
    }

    .btn-secondary {
      background: #2f89d9;
      color: white;
    }

    .btn-secondary:hover {
      background: #1e74c0;
    }

    .message {
      margin-top: 14px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .success {
      background: #e3f7e8;
      color: #1f7a35;
      border: 1px solid #b7e3c2;
    }

    .error {
      background: #fde8e8;
      color: #b42318;
      border: 1px solid #f5b5b5;
    }

    .small-note {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- LOGIN CARD -->
    <div class="card">
      <div class="logo-area">
        <!-- Replace with your actual logo path -->
        <img src="deped-logo.png" alt="DepEd Logo">
      </div>
      <h2>DepEd DLL System Login</h2>

      <label for="loginRole">Select Role</label>
      <select id="loginRole">
        <option value="">-- Select Role --</option>
        <option value="teacher">Teacher</option>
        <option value="department_head">Department Head</option>
        <option value="school_head">School Head</option>
      </select>

      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="Enter email">

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password">

      <button class="btn btn-primary" id="loginBtn">Login</button>

      <div id="loginMessage" class="message"></div>
    </div>

    <!-- REGISTER CARD -->
    <div class="card">
      <div class="logo-area">
        <img src="deped-logo.png" alt="DepEd Logo">
      </div>
      <h2>Register New User</h2>

      <label for="registerRole">Select Role</label>
      <select id="registerRole">
        <option value="">-- Select Role --</option>
        <option value="teacher">Teacher</option>
        <option value="department_head">Department Head</option>
        <option value="school_head">School Head</option>
      </select>

      <label for="registerEmail">Email</label>
      <input type="email" id="registerEmail" placeholder="Enter email">

      <label for="registerPassword">Password</label>
      <input type="password" id="registerPassword" placeholder="Enter password">

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password">

      <h3>Personal Information</h3>

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="Enter full name">

      <label for="depedEmail">DepEd Email Address</label>
      <input type="email" id="depedEmail" placeholder="Enter DepEd email">

      <label for="permanentAddress">Permanent Address</label>
      <input type="text" id="permanentAddress" placeholder="Enter permanent address">

      <label for="mobilePhone">Mobile Phone</label>
      <input type="text" id="mobilePhone" placeholder="Enter mobile number">

      <h3>School Information</h3>

      <label for="division">Division</label>
      <input type="text" id="division" placeholder="Enter division">

      <label for="district">District</label>
      <input type="text" id="district" placeholder="Enter district">

      <label for="school">School</label>
      <input type="text" id="school" placeholder="Enter school name">

      <label for="schoolId">School ID</label>
      <input type="text" id="schoolId" placeholder="Enter school ID">

      <label for="schoolHead">School Head</label>
      <input type="text" id="schoolHead" placeholder="Enter school head">

      <label for="departmentHead">Department Head</label>
      <input type="text" id="departmentHead" placeholder="Enter department head">

      <button class="btn btn-secondary" id="registerBtn">Register</button>

      <div id="registerMessage" class="message"></div>
      <div class="small-note">New users will automatically have their profile information saved.</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
authDomain: "teachers-portal-98254.firebaseapp.com",
projectId: "teachers-portal-98254",
storageBucket: "teachers-portal-98254.firebasestorage.app",
messagingSenderId: "479254583768",
appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ---------------- HELPERS ----------------
    function showMessage(elementId, text, type) {
      const el = document.getElementById(elementId);
      el.style.display = "block";
      el.textContent = text;
      el.className = `message ${type}`;
    }

    function clearMessage(elementId) {
      const el = document.getElementById(elementId);
      el.style.display = "none";
      el.textContent = "";
      el.className = "message";
    }

    // ---------------- LOGIN ----------------
    document.getElementById("loginBtn").addEventListener("click", async () => {
      clearMessage("loginMessage");

      const role = document.getElementById("loginRole").value;
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if (!role || !email || !password) {
        showMessage("loginMessage", "Please fill in role, email, and password.", "error");
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          showMessage("loginMessage", "User profile not found in Firestore.", "error");
          return;
        }

        const userData = userSnap.data();
        const savedRole = userData.role;

        if (savedRole !== role && savedRole !== "super_admin") {
          showMessage("loginMessage", "Wrong role selected.", "error");
          return;
        }

        showMessage("loginMessage", "Login successful.", "success");

        if (role === "teacher") {
          window.location.href = "profile.html";
        } else if (role === "department_head") {
          window.location.href = "checker-dashboard.html";
        } else if (role === "school_head") {
          window.location.href = "approver-dashboard.html";
        }

      } catch (error) {
        showMessage("loginMessage", error.message, "error");
      }
    });

    // ---------------- REGISTER ----------------
    document.getElementById("registerBtn").addEventListener("click", async () => {
      clearMessage("registerMessage");

      const role = document.getElementById("registerRole").value;
      const email = document.getElementById("registerEmail").value.trim();
      const password = document.getElementById("registerPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      const fullName = document.getElementById("fullName").value.trim();
      const depedEmail = document.getElementById("depedEmail").value.trim();
      const permanentAddress = document.getElementById("permanentAddress").value.trim();
      const mobilePhone = document.getElementById("mobilePhone").value.trim();

      const division = document.getElementById("division").value.trim();
      const district = document.getElementById("district").value.trim();
      const school = document.getElementById("school").value.trim();
      const schoolId = document.getElementById("schoolId").value.trim();
      const schoolHead = document.getElementById("schoolHead").value.trim();
      const departmentHead = document.getElementById("departmentHead").value.trim();

      if (
        !role || !email || !password || !confirmPassword ||
        !fullName || !depedEmail || !permanentAddress || !mobilePhone ||
        !division || !district || !school || !schoolId || !schoolHead || !departmentHead
      ) {
        showMessage("registerMessage", "Please complete all registration fields.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("registerMessage", "Passwords do not match.", "error");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          email: email,
          role: role,

          // Personal Information
          name: fullName,
          depedEmail: depedEmail,
          permanentAddress: permanentAddress,
          mobilePhone: mobilePhone,

          // School Information
          division: division,
          district: district,
          school: school,
          schoolId: schoolId,
          schoolHead: schoolHead,
          departmentHead: departmentHead,

          // Optional profile fields for later use
          employeeId: "",
          prcLicense: "",
          philhealth: "",
          tin: "",
          gsis: "",
          pagibig: "",
          photoURL: "",

          createdAt: serverTimestamp()
        });

        showMessage("registerMessage", "Registration successful. User profile has been created.", "success");

        // Optional auto-redirect after registration
        setTimeout(() => {
          if (role === "teacher") {
            window.location.href = "profile.html";
          } else if (role === "department_head") {
            window.location.href = "checker-dashboard.html";
          } else if (role === "school_head") {
            window.location.href = "approver-dashboard.html";
          }
        }, 1200);

      } catch (error) {
        showMessage("registerMessage", error.message, "error");
      }
    });
  </script>
</body>
</html>
