<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>
  <link rel="icon" type="image/png" href="images/deped-favicon.png">
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#333;
    }

    .header{
      background:#004aad;
      color:white;
      padding:20px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .header h1{
      margin:0;
      font-size:24px;
    }

    .header .user-info{
      font-size:14px;
      text-align:right;
    }

    .navbar{
      display:flex;
      gap:10px;
      padding:15px 30px;
      background:white;
      border-bottom:1px solid #ddd;
      flex-wrap:wrap;
    }

    .navbar button{
      background:#004aad;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
    }

    .navbar button:hover{
      background:#00307a;
    }

    .container{
      padding:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .card h3{
      margin:0 0 10px 0;
      color:#004aad;
      font-size:18px;
    }

    .card .count{
      font-size:30px;
      font-weight:bold;
    }

    .section{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    .section h2{
      margin-top:0;
      color:#004aad;
    }

    ul{
      padding-left:20px;
      margin:0;
    }

    li{
      margin-bottom:10px;
    }

    .status-label{
      font-weight:bold;
      text-transform:capitalize;
    }

    .status-returned{
      color:#c62828;
    }

    .status-submitted{
      color:#0b8f3c;
    }

    .status-checked{
      color:#1565c0;
    }

    .status-approved{
      color:#2e7d32;
    }

    .status-draft{
      color:#cc8400;
    }

    .empty{
      color:#666;
    }

    #message{
      margin-top:15px;
      color:red;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Teacher Dashboard</h1>
    <div class="user-info">
      <div id="teacherName">Loading...</div>
      <div id="teacherSchool"></div>
    </div>
  </div>

  <div class="navbar">
    <button onclick="goToDashboard()">Dashboard</button>
    <button onclick="goToProfile()">Profile</button>
    <button onclick="goToLessonPlan()">Lesson Plan</button>
    <button onclick="goToLessonLog()">Lesson Log</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Drafts</h3>
        <div class="count" id="draftCount">0</div>
      </div>

      <div class="card">
        <h3>Submitted</h3>
        <div class="count" id="submittedCount">0</div>
      </div>

      <div class="card">
        <h3>Returned</h3>
        <div class="count" id="returnedCount">0</div>
      </div>

      <div class="card">
        <h3>Approved</h3>
        <div class="count" id="approvedCount">0</div>
      </div>
    </div>

    <div class="section">
      <h2>Notifications</h2>
      <ul id="notificationsList">
        <li class="empty">Loading notifications...</li>
      </ul>
      <div id="message"></div>
    </div>

    <div class="section">
      <h2>Recent Lesson Plans</h2>
      <ul id="recentLessonsList">
        <li class="empty">Loading recent lesson plans...</li>
      </ul>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmb0oDlQVfEhcqx6OPgmWwump0b0R09xs",
      authDomain: "teachers-portal-98254.firebaseapp.com",
      projectId: "teachers-portal-98254",
      storageBucket: "teachers-portal-98254.firebasestorage.app",
      messagingSenderId: "479254583768",
      appId: "1:479254583768:web:b8dcf9da3a5616d5b37aad"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser;
    let currentProfile;
    let teacherLessons = [];

    function setMessage(text, color="red"){
      const el = document.getElementById("message");
      el.style.color = color;
      el.innerText = text;
    }

    onAuthStateChanged(auth, async (user) => {
      if(!user){
        window.location.href = "login.html";
        return;
      }

      currentUser = user;

      try{
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if(!userSnap.exists()){
          window.location.href = "login.html";
          return;
        }

        currentProfile = userSnap.data();

        if(currentProfile.role !== "teacher" && currentProfile.role !== "super_admin"){
          alert("Access denied.");
          window.location.href = "login.html";
          return;
        }

        document.getElementById("teacherName").innerText = currentProfile.name || "Teacher";
        document.getElementById("teacherSchool").innerText = currentProfile.school || "";

        await loadTeacherDashboard();

      }catch(error){
        console.error("Teacher dashboard error:", error);
        setMessage("Failed to load teacher dashboard.");
      }
    });

    async function loadTeacherDashboard(){
      const snap = await getDocs(collection(db, "lessonPlans"));
      teacherLessons = [];

      snap.forEach(docSnap => {
        const data = docSnap.data();

        if(data.userId === currentUser.uid){
          teacherLessons.push({
            id: docSnap.id,
            ...data
          });
        }
      });

      renderCounts();
      renderNotifications();
      renderRecentLessons();
    }

    function renderCounts(){
      let draft = 0;
      let submitted = 0;
      let returned = 0;
      let approved = 0;

      teacherLessons.forEach(item => {
        const status = (item.status || "").toLowerCase();

        if(status === "draft") draft++;
        if(status === "submitted") submitted++;
        if(status === "returned") returned++;
        if(status === "approved") approved++;
      });

      document.getElementById("draftCount").innerText = draft;
      document.getElementById("submittedCount").innerText = submitted;
      document.getElementById("returnedCount").innerText = returned;
      document.getElementById("approvedCount").innerText = approved;
    }

    function renderNotifications(){
      const list = document.getElementById("notificationsList");

      if(!teacherLessons.length){
        list.innerHTML = `<li class="empty">No notifications yet.</li>`;
        return;
      }

      const notifications = [];

      teacherLessons.forEach(item => {
        const status = (item.status || "").toLowerCase();

        if(status === "returned"){
          notifications.push(`
            <li>
              <span class="status-label status-returned">Returned:</span>
              Your DLL for <strong>${item.dateRange || "-"}</strong> in
              <strong>${item.learningArea || "-"}</strong> was returned by the Department Head.
              ${item.checkerComment ? `<br>Comment: ${item.checkerComment}` : ""}
            </li>
          `);
        }

        if(status === "checked"){
          notifications.push(`
            <li>
              <span class="status-label status-checked">Checked:</span>
              Your DLL for <strong>${item.dateRange || "-"}</strong> in
              <strong>${item.learningArea || "-"}</strong> was approved by the Department Head and forwarded.
              ${item.checkerComment ? `<br>Comment: ${item.checkerComment}` : ""}
            </li>
          `);
        }

        if(status === "approved"){
          notifications.push(`
            <li>
              <span class="status-label status-approved">Approved:</span>
              Your DLL for <strong>${item.dateRange || "-"}</strong> in
              <strong>${item.learningArea || "-"}</strong> has final approval.
            </li>
          `);
        }

        if(status === "submitted"){
          notifications.push(`
            <li>
              <span class="status-label status-submitted">Submitted:</span>
              Your DLL for <strong>${item.dateRange || "-"}</strong> in
              <strong>${item.learningArea || "-"}</strong> is waiting for Department Head review.
            </li>
          `);
        }
      });

      if(!notifications.length){
        list.innerHTML = `<li class="empty">No notifications yet.</li>`;
        return;
      }

      list.innerHTML = notifications.slice(0, 6).join("");
    }

    function renderRecentLessons(){
      const list = document.getElementById("recentLessonsList");

      if(!teacherLessons.length){
        list.innerHTML = `<li class="empty">No lesson plans found.</li>`;
        return;
      }

      teacherLessons.sort((a, b) => {
        return (b.submittedAt || b.date || "").localeCompare(a.submittedAt || a.date || "");
      });

      const recent = teacherLessons.slice(0, 6);

      list.innerHTML = recent.map(item => `
        <li>
          <strong>${item.learningArea || "-"}</strong> |
          Grade ${item.grade || "-"} |
          ${item.dateRange || "-"} |
          <span class="status-label status-${(item.status || "").toLowerCase()}">${item.status || "-"}</span>
        </li>
      `).join("");
    }

    window.goToDashboard = function(){
      window.location.href = "teacher-dashboard.html";
    };

    window.goToProfile = function(){
      window.location.href = "profile.html";
    };

    window.goToLessonPlan = function(){
      window.location.href = "lesson-plan.html";
    };

    window.goToLessonLog = function(){
      window.location.href = "lesson-log-history.html";
    };

    window.logout = function(){
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };
  </script>

</body>
</html>
